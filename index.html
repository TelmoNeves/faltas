<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Lista Produtos</title>

<link rel="manifest" href="manifest.json">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="script.js"></script>

<style>

body{
padding:20px;
}

.produto{

display:flex;
justify-content:space-between;
align-items:center;

padding:10px;

border:1px solid #ddd;
border-radius:10px;
margin-bottom:8px;

}

.qtd{

display:inline-block;
width:30px;
text-align:center;

}

.tabArea{

overflow-x:auto;
white-space:nowrap;
margin-bottom:20px;

}

.categoria{

border:1px solid #ddd;
padding:15px;
border-radius:10px;
margin-bottom:20px;

}

</style>

</head>

<body>

<div class="container">

<h2>Lista Produtos</h2>

<div
id="tabs"
class="tabArea">
</div>

<div class="mb-3">

<button
class="btn btn-dark btn-sm"
onclick="alternarEdicao()"
id="botaoEditar">

Editar

</button>

<span id="areaEdicao"></span>

<button
class="btn btn-success btn-sm"
onclick="mostrarExportacao()">

Exportar

</button>

<button
class="btn btn-info btn-sm"
onclick="exportarJSON()">

Exportar JSON

</button>

<button
class="btn btn-warning btn-sm"
onclick="resetTab()">

Reset

</button>

</div>
  
<div id="conteudo"></div>

</div>

</body>
</html>
