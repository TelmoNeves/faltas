<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Lista Produtos</title>

<link rel="manifest" href="manifest.json">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
padding:20px;
}

.produto{

display:flex;
justify-content:space-between;
align-items:center;

padding:10px;

border:1px solid #ddd;
border-radius:10px;
margin-bottom:8px;

}

.qtd{

display:inline-block;
width:30px;
text-align:center;

}

.tabArea{

overflow-x:auto;
white-space:nowrap;
margin-bottom:20px;

}

.categoria{

border:1px solid #ddd;
padding:15px;
border-radius:10px;
margin-bottom:20px;

}

</style>

</head>

<body>

<div class="container">

<h2>Lista Produtos</h2>

<div
id="tabs"
class="tabArea">
</div>

<div class="mb-3">

<button
class="btn btn-primary btn-sm"
onclick="novaTab()">

+ Nova Aba

</button>

<button
class="btn btn-secondary btn-sm"
onclick="novaCategoria()">

+ Categoria

</button>

<button
class="btn btn-success btn-sm"
onclick="mostrarExportacao()">

Exportar

</button>

<button
class="btn btn-info btn-sm"
onclick="exportarJSON()">

Exportar JSON

</button>

<button
class="btn btn-warning btn-sm"
onclick="resetTab()">

Reset

</button>

</div>
  
<div id="conteudo"></div>

</div>

<script>

let dados=
JSON.parse(
localStorage.getItem(
"dados"
)
)||{

tabAtual:"",

tabs:{}

};

function guardar(){

localStorage.setItem(
"dados",
JSON.stringify(
dados
)
);

render();

}

function renderTabs(){

let html="";

Object.keys(
dados.tabs
)

.forEach(

tab=>{

html+=`

<button
class="btn ${
tab===dados.tabAtual
?
'btn-primary'
:
'btn-outline-primary'
}

me-2"

onclick="
trocarTab(
'${tab}'
)
">

${tab}

</button>

`;

}

);

document
.getElementById(
"tabs"
)
.innerHTML=
html;

}

function trocarTab(nome){

dados.tabAtual=
nome;

guardar();

}

function novaTab(){

let nome=
prompt(
"Nome da aba:"
);

if(
!nome
)return;

dados.tabs[
nome
]={};

dados.tabAtual=
nome;

guardar();

}

function removerCategoria(nome){

if(
!confirm(
"Remover categoria?"
)
)return;

delete dados
.tabs[
dados.tabAtual
][nome];

guardar();

}

function novaCategoria(){

if(
!dados.tabAtual
){

alert(
"Crie uma aba primeiro"
);

return;

}

let nome=
prompt(
"Nome categoria:"
);

if(
!nome
)return;

dados.tabs[
dados.tabAtual
][nome]={};

guardar();

}

function novoProduto(
categoria
){

let nome=
prompt(
"Nome produto:"
);

if(
!nome
)return;

dados
.tabs[
dados.tabAtual
]
[categoria]
[nome]=0;

guardar();

}

function removerProduto(
categoria,
produto
){

delete dados
.tabs[
dados.tabAtual
]
[categoria]
[produto];

guardar();

}

function alterar(
categoria,
produto,
valor
){

let atual=

dados
.tabs[
dados.tabAtual
]
[categoria]
[produto];

dados
.tabs[
dados.tabAtual
]
[categoria]
[produto]=

Math.max(
0,
atual+valor
);

guardar();

}

function render(){

renderTabs();

if(
!dados.tabAtual
){

document
.getElementById(
"conteudo"
)

.innerHTML=

"Crie uma aba";

return;

}

let html="";

Object.entries(

dados.tabs[
dados.tabAtual
]

)

.forEach(

([categoria,
produtos])=>{

html+=`

<div class="categoria">

<h5>

${categoria}

<button
class="btn btn-danger btn-sm ms-2"

onclick="
removerCategoria(
'${categoria}'
)
">

X

</button>

</h5>

<button
class="btn btn-secondary btn-sm mb-3"

onclick="
novoProduto(
'${categoria}'
)
">

+ Produto

</button>

`;

Object.entries(
produtos
)

.forEach(

([produto,
qtd])=>{

html+=`

<div class="produto">

<div>

${produto}

<button
class="btn btn-danger btn-sm ms-2"

onclick="
removerProduto(
'${categoria}',
'${produto}'
)
">

X

</button>

</div>

<div>

<button
class="btn btn-secondary btn-sm"

onclick="
alterar(
'${categoria}',
'${produto}',
-1
)
">

-

</button>

<span class="qtd">

${qtd}

</span>

<button
class="btn btn-primary btn-sm"

onclick="
alterar(
'${categoria}',
'${produto}',
1
)
">

+

</button>

</div>

</div>

`;

}

);

html+=`</div>`;

}

);

document
.getElementById(
"conteudo"
)
.innerHTML=
html;

}

function mostrarExportacao(){

let txt=

dados.tabAtual+

"\n\n";

Object.values(

dados.tabs[
dados.tabAtual
]

)

.forEach(

produtos=>{

Object.entries(
produtos
)

.filter(
([p,q])=>
q>0
)

.forEach(

([p,q])=>{

txt+=
q+
" x "+
p+
"\n";

}

);

}

);

alert(
txt
);

navigator
.clipboard
.writeText(
txt
);

}

function exportarJSON(){

let estrutura={
tabs:[]
};

Object.entries(
dados.tabs
)

.forEach(

([tab,
categorias])=>{

let t={

nome:tab,
categorias:[]

};

Object.entries(
categorias
)

.forEach(

([cat,
produtos])=>{

t.categorias
.push({

nome:cat,

produtos:
Object.keys(
produtos
)

});

}

);

estrutura.tabs.push(
t
);

}

);

let texto=

JSON.stringify(
estrutura,
null,
2
);

let blob=
new Blob(
[texto],
{
type:"application/json"
}
);

let a=
document.createElement(
"a"
);

a.href=
URL.createObjectURL(
blob
);

a.download=
"produtos.json";

a.click();

}

  function resetTab(){

if(
!confirm(
"Tem a certeza que pretende fazer reset desta aba?"
)
){
return;
}

Object.entries(

dados.tabs[
dados.tabAtual
]

)

.forEach(

([categoria,produtos])=>{

Object.keys(
produtos
)

.forEach(

produto=>{

dados
.tabs[
dados.tabAtual
]
[categoria]
[produto]=0;

}

);

}

);

guardar();

}

render();

</script>

</body>
</html>
