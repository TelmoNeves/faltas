<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Lista Produtos</title>

<link rel="manifest" href="manifest.json">

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{
padding:20px;
}

.produto{
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid #ddd;
border-radius:10px;
padding:10px;
margin-bottom:8px;
}

.qtd{
display:inline-block;
min-width:30px;
text-align:center;
}

.tab-scroll{
overflow-x:auto;
white-space:nowrap;
}

.modal-bg{

position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);

display:none;

align-items:center;
justify-content:center;

padding:20px;

}

.modal-box{

background:white;
padding:20px;
border-radius:12px;
width:100%;
max-width:500px;

}

pre{
white-space:pre-wrap;
}

</style>

</head>

<body>

<div class="container">

<h2>Lista Produtos</h2>

<div
id="tabs"
class="tab-scroll mb-3">
</div>

<div class="mb-3">

<button
class="btn btn-primary btn-sm"
onclick="novaTab()">

+ Nova Aba

</button>

<button
class="btn btn-secondary btn-sm"
onclick="novoProduto()">

+ Produto

</button>

</div>

<div id="lista"></div>

<div class="mt-3">

<button
class="btn btn-success"
onclick="mostrarExportacao()">

Exportar

</button>

<button
class="btn btn-warning"
onclick="zerar()">

Zerar

</button>

</div>

</div>

<div
class="modal-bg"
id="modal">

<div class="modal-box">

<h5>Pré-visualização</h5>

<pre id="preview"></pre>

<div class="mt-3">

<button
class="btn btn-primary"
onclick="copiar()">

Copiar

</button>

<button
class="btn btn-success"
onclick="partilhar()">

Partilhar

</button>

<button
class="btn btn-secondary"
onclick="fecharModal()">

Fechar

</button>

</div>

</div>

</div>

<script>

let dados=
JSON.parse(
localStorage.getItem(
"dados"
)
)||{

tabAtual:"Mercearia",

tabs:{

Mercearia:{

Leite:0,
Arroz:0,
Feijão:0

}

}

};

let textoExportacao="";

function guardar(){

localStorage.setItem(
"dados",
JSON.stringify(
dados
)
);

render();

}

function renderTabs(){

let html="";

Object.keys(
dados.tabs
)

.forEach(nome=>{

html+=`

<button
class="btn ${
nome===dados.tabAtual
?
'btn-primary'
:
'btn-outline-primary'
}
me-2 mb-2"

onclick="
trocarTab(
'${nome}'
)
">

${nome}

</button>

`;

});

document
.getElementById(
"tabs"
)
.innerHTML=html;

}

function trocarTab(nome){

dados.tabAtual=
nome;

guardar();

}

function render(){

renderTabs();

let produtos=
dados.tabs[
dados.tabAtual
];

let html="";

Object
.entries(produtos)

.forEach(

([nome,qtd])=>{

html+=`

<div class="produto">

<div>
${nome}
</div>

<div>

<button
class="btn btn-secondary btn-sm"
onclick="
alterar(
'${nome}',
-1
)
">

-

</button>

<span class="qtd">

${qtd}

</span>

<button
class="btn btn-primary btn-sm"
onclick="
alterar(
'${nome}',
1
)
">

+

</button>

</div>

</div>

`;

}

);

document
.getElementById(
"lista"
)
.innerHTML=html;

}

function alterar(
nome,
valor
){

let atual=
dados.tabs[
dados.tabAtual
][nome];

dados.tabs[
dados.tabAtual
][nome]=
Math.max(
0,
atual+valor
);

guardar();

}

function novaTab(){

let nome=
prompt(
"Nome da aba:"
);

if(
!nome
)
return;

dados.tabs[
nome
]={};

dados.tabAtual=
nome;

guardar();

}

function novoProduto(){

let nome=
prompt(
"Nome do produto:"
);

if(
!nome
)
return;

dados.tabs[
dados.tabAtual
][nome]=0;

guardar();

}

function zerar(){

Object
.keys(
dados.tabs[
dados.tabAtual
]
)

.forEach(

p=>{

dados.tabs[
dados.tabAtual
][p]=0;

}

);

guardar();

}

function mostrarExportacao(){

let txt=
dados.tabAtual+
"\n\n";

Object
.entries(
dados.tabs[
dados.tabAtual
]
)

.filter(
([n,q])=>
q>0
)

.forEach(

([n,q])=>{

txt+=
q+
" x "+
n+
"\n";

}

);

textoExportacao=
txt;

document
.getElementById(
"preview"
)
.innerText=
txt;

document
.getElementById(
"modal"
)
.style.display=
"flex";

}

function fecharModal(){

document
.getElementById(
"modal"
)
.style.display=
"none";

}

function copiar(){

navigator
.clipboard
.writeText(
textoExportacao
);

}

function partilhar(){

if(
navigator.share
){

navigator.share({

text:
textoExportacao

});

}

}

render();

</script>

</body>
</html>
